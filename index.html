<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NatsuBerry</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">

    <header class="top-card">
      <h1>NatsuBerry 🍓</h1>
      <div class="top-buttons">
        <label for="photo-input" class="photo-button">🖼️</label>
        <button>⚙️</button>
      </div>
    </header>

    <section class="photo-card" id="photo-card">
  <input type="file" id="photo-input" accept="image/*" hidden />

  <div class="photo-placeholder" id="photo-placeholder">
    <div class="plus">＋</div>
    <strong>上传照片</strong>
    <p>在这里展示你们的照片吧</p>
  </div>

  <img id="photo-preview"
     class="photo-preview"
     alt="Uploaded photo"
     hidden />

</section>

    <section class="action-grid">
      <button class="action add">
        <span>＋</span>
        Add Event
      </button>

      <button class="action calendar">
        <span>▣</span>
        Calendar
      </button>

      <button class="action list">
        <span>≡</span>
        List
      </button>
    </section>

    <section class="today-card">
      <div class="section-header">
        <h2>Today</h2>
        <span id="today-date">June 2</span>
      </div>

      <div class="event pink">
        <span class="time">13:00</span>
        <div>
          <strong>P3 Exam</strong>
          <p>Created by Chinatsu</p>
        </div>
      </div>

      <div class="event blue">
        <span class="time">16:30</span>
        <div>
          <strong>Study Plan</strong>
          <p>Created by Strawberry</p>
        </div>
      </div>
    </section>

    <section class="upcoming-card">
      <h2>Upcoming Events 🏆</h2>

      <div class="upcoming-item">
        <span>🍓</span>
        <strong>Anniversary</strong>
        <b>›</b>
      </div>

      <div class="upcoming-item">
        <span>🎂</span>
        <strong>Birthday</strong>
        <b>›</b>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
