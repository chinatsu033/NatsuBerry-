<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NatsuBerry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-overlay">
        <button class="menu-btn">☰</button>
        <div class="top-actions">
          <button>🔔</button>
          <button>🔍</button>
          <button>＋</button>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="quick-actions">
        <button>
          <span>＋</span>
          Add Event
        </button>
        <button>
          <span>▦</span>
          Calendar
        </button>
        <button>
          <span>☰</span>
          List
        </button>
      </div>

      <header class="today-header">
        <h1 id="today-title">Today</h1>
      </header>

      <section class="schedule">
        <div class="time-row">
          <div class="time">
            <strong>13:00</strong>
            <span>1h 30m</span>
          </div>

          <div class="event event-user-a">
            <strong>P3 Exam</strong>
            <span>Created by Chinatsu</span>
          </div>
        </div>

        <div class="time-row">
          <div class="time">
            <strong>16:30</strong>
            <span>45m</span>
          </div>

          <div class="event event-user-b">
            <strong>Study Plan</strong>
            <span>Created by Strawberry</span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
